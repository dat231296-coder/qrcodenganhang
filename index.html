<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VietQR Pro - HKD LINH HẢI</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <style>
        :root {
            --primary-color: #4f46e5;
            --primary-hover: #4338ca;
            --secondary-color: #f3f4f6;
            --text-main: #1f2937;
            --text-sub: #6b7280;
            --bg-body: #eef2ff;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-body);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px 0;
        }

        .main-container { width: 100%; max-width: 950px; }
        .main-card {
            background: white; border-radius: 24px;
            box-shadow: 0 10px 40px rgba(79, 70, 229, 0.08); overflow: hidden;
        }
        .card-body-wrapper { padding: 40px; }

        .page-title { font-weight: 800; color: var(--primary-color); margin-bottom: 5px; }
        .page-subtitle { color: var(--text-sub); margin-bottom: 25px; font-size: 0.95rem; }

        /* Nút chọn nhanh tài khoản */
        .quick-select-label { font-size: 0.85rem; font-weight: 700; color: #64748b; margin-bottom: 10px; display: block; text-transform: uppercase; }
        .quick-accounts { display: flex; gap: 10px; margin-bottom: 30px; flex-wrap: wrap; }
        .btn-quick {
            background: white; border: 2px solid #e5e7eb; padding: 10px 15px; border-radius: 12px;
            font-size: 0.85rem; font-weight: 600; color: var(--text-main); transition: all 0.2s; flex: 1; min-width: 200px;
            text-align: left; display: flex; align-items: center; gap: 10px;
        }
        .btn-quick:hover { border-color: var(--primary-color); background: #f5f3ff; }
        .btn-quick i { font-size: 1.2rem; }

        .form-label { font-weight: 600; font-size: 0.9rem; color: #4b5563; margin-bottom: 8px; }
        .optional-text { font-size: 0.8rem; color: #9ca3af; font-weight: 400; }
        .form-control, .form-select {
            border: 2px solid #e5e7eb; border-radius: 12px; padding: 12px 15px; font-weight: 500;
        }
        .form-control:focus, .form-select:focus {
            border-color: #a5b4fc; box-shadow: 0 0 0 4px rgba(79, 70, 229, 0.1);
        }

        .btn-submit {
            background-image: linear-gradient(135deg, #4f46e5 0%, #7c3aed 100%);
            border: none; color: white; font-weight: 700; padding: 15px 25px; border-radius: 12px;
        }
        .btn-submit:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(79, 70, 229, 0.3); color: white;}

        .result-panel {
            background-color: var(--secondary-color); border-radius: 20px; padding: 30px;
            height: 100%; display: flex; flex-direction: column; align-items: center;
            justify-content: center; opacity: 0.8;
        }
        .result-panel.has-result { opacity: 1; border: 2px solid #d1d5db; }

        .qr-placeholder { text-align: center; color: var(--text-sub); }
        .qr-placeholder i { font-size: 4rem; display: block; margin-bottom: 15px; opacity: 0.5; }

        #qr-img {
            max-width: 220px; height: auto; border-radius: 15px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1); background: white; padding: 10px; margin-bottom: 15px;
        }

        .transfer-info-box {
            background: white; width: 100%; border-radius: 12px; padding: 15px;
            text-align: left; font-size: 0.9rem; margin-bottom: 15px; border: 1px dashed #cbd5e1;
        }
        .info-row {
            display: flex; justify-content: space-between; align-items: center;
            padding: 8px 0; border-bottom: 1px solid #f1f5f9;
        }
        .info-row:last-child { border-bottom: none; }
        .info-label { color: #64748b; font-weight: 500; }
        .info-value { font-weight: 700; color: #0f172a; word-break: break-all; margin-right: 10px;}
        
        .btn-copy {
            background: #eef2ff; color: var(--primary-color); border: none;
            padding: 4px 10px; border-radius: 6px; font-size: 0.75rem; font-weight: 600;
            cursor: pointer; transition: all 0.2s; white-space: nowrap;
        }
        .btn-copy:hover { background: var(--primary-color); color: white; }
        .btn-copy.copied { background: #10b981; color: white; }

        @media (max-width: 768px) {
            .card-body-wrapper { padding: 25px; }
            .result-panel { margin-top: 30px; padding: 20px; }
        }
    </style>
</head>
<body>

    <div class="container main-container">
        <div class="main-card">
            <div class="card-body-wrapper">
                <div class="row">
                    <div class="col-md-7">
                        <h1 class="page-title">VietQR <span style="font-weight: 300;">PRO</span></h1>
                        <p class="page-subtitle">Hệ thống thanh toán nhanh cho đối tác LINH HẢI.</p>
                        
                        <span class="quick-select-label">Chọn tài khoản mặc định</span>
                        <div class="quick-accounts">
                            <button type="button" class="btn-quick" onclick="fillAccount('970403', '030102164195', 'HKD LINH HAI')">
                                🏦 <span><strong>Sacombank</strong><br><small>HKD LINH HAI</small></span>
                            </button>
                            <button type="button" class="btn-quick" onclick="fillAccount('970415', '111003008338', 'CT TNHH MTV LINH HAI')">
                                🏦 <span><strong>Vietinbank</strong><br><small>LINH HAI CO., LTD</small></span>
                            </button>
                        </div>

                        <form id="qr-form">
                            <div class="mb-3">
                                <label class="form-label">🏦 Ngân hàng thụ hưởng</label>
                                <select id="bank" class="form-select" required>
                                    <option value="">Đang tải danh sách...</option>
                                </select>
                            </div>
                            
                            <div class="row mb-3">
                                <div class="col-sm-6">
                                    <label class="form-label">💳 Số tài khoản</label>
                                    <input type="text" id="account" class="form-control" placeholder="Số tài khoản" required>
                                </div>
                                <div class="col-sm-6 mt-3 mt-sm-0">
                                    <label class="form-label">👤 Tên tài khoản</label>
                                    <input type="text" id="accountName" class="form-control" placeholder="Tên không dấu" required>
                                </div>
                            </div>
                            
                            <div class="row mb-3">
                                <div class="col-sm-6">
                                    <label class="form-label">💵 Số tiền <span class="optional-text">(Không bắt buộc)</span></label>
                                    <input type="number" id="amount" class="form-control" placeholder="Để trống khách tự nhập">
                                </div>
                                <div class="col-sm-6 mt-3 mt-sm-0">
                                    <label class="form-label">📝 Nội dung <span class="optional-text">(Không bắt buộc)</span></label>
                                    <input type="text" id="info" class="form-control" placeholder="Tên hoặc lý do">
                                </div>
                            </div>
                            
                            <div class="mt-4">
                                <button type="submit" class="btn btn-submit w-100 fs-5">Tạo Mã QR Thanh Toán</button>
                            </div>
                        </form>
                    </div>

                    <div class="col-md-5 mt-4 mt-md-0">
                        <div id="result-panel" class="result-panel">
                            <div id="qr-placeholder" class="qr-placeholder">
                                <i class="text-primary fs-1 mb-3">✦</i>
                                <h5>Kết quả hiện ở đây</h5>
                            </div>
                            <img id="qr-img" src="" alt="QR Code" class="d-none">
                            
                            <div id="transfer-info" class="transfer-info-box d-none">
                                <div class="info-row"><span class="info-label">Ngân hàng:</span><span class="info-value" id="res-bank">...</span></div>
                                <div class="info-row"><span class="info-label">Chủ TK:</span><span class="info-value" id="res-name">...</span></div>
                                <div class="info-row"><span class="info-label">Số TK:</span><div class="d-flex align-items-center"><span class="info-value" id="res-account">...</span><button type="button" class="btn-copy" onclick="copyToClipboard('res-account', this)">Copy</button></div></div>
                                <div class="info-row"><span class="info-label">Số tiền:</span><div class="d-flex align-items-center"><span class="info-value" id="res-amount">...</span><button type="button" class="btn-copy" onclick="copyToClipboard('res-amount-raw', this)">Copy</button><span id="res-amount-raw" class="d-none"></span></div></div>
                                <div class="info-row"><span class="info-label">Nội dung:</span><div class="d-flex align-items-center"><span class="info-value" id="res-info">...</span><button type="button" class="btn-copy" onclick="copyToClipboard('res-info', this)">Copy</button></div></div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Hàm tự động điền tài khoản
        function fillAccount(bankBin, accNum, accName) {
            document.getElementById('bank').value = bankBin;
            document.getElementById('account').value = accNum;
            document.getElementById('accountName').value = accName;
        }

        function copyToClipboard(elementId, btnElement) {
            const textToCopy = document.getElementById(elementId).innerText;
            navigator.clipboard.writeText(textToCopy).then(() => {
                const originalText = btnElement.innerText;
                btnElement.innerText = "Đã Copy ✓";
                btnElement.classList.add("copied");
                setTimeout(() => { btnElement.innerText = originalText; btnElement.classList.remove("copied"); }, 2000);
            });
        }

        document.addEventListener('DOMContentLoaded', async () => {
            const bankSelect = document.getElementById('bank');
            try {
                const response = await fetch('https://api.vietqr.io/v2/banks');
                const result = await response.json();
                const banks = result.data;
                bankSelect.innerHTML = '<option value="">-- Vui lòng chọn ngân hàng --</option>';
                banks.forEach(bank => {
                    bankSelect.innerHTML += `<option value="${bank.bin}" data-name="${bank.shortName}">${bank.shortName} - ${bank.name}</option>`;
                });
            } catch (error) { bankSelect.innerHTML = '<option value="">Lỗi tải dữ liệu.</option>'; }
        });

        document.getElementById('qr-form').addEventListener('submit', function(e) {
            e.preventDefault();
            const bankSelect = document.getElementById('bank');
            const bin = bankSelect.value;
            const bankName = bankSelect.options[bankSelect.selectedIndex].getAttribute('data-name');
            const acc = document.getElementById('account').value;
            const accName = document.getElementById('accountName').value.toUpperCase();
            const amt = document.getElementById('amount').value;
            const info = document.getElementById('info').value;
            
            let qrUrl = `https://img.vietqr.io/image/${bin}-${acc}-compact2.png`;
            let queryParams = [];
            if (accName) queryParams.push(`accountName=${encodeURIComponent(accName)}`);
            if (amt) queryParams.push(`amount=${amt}`);
            if (info) queryParams.push(`addInfo=${encodeURIComponent(info)}`);
            if (queryParams.length > 0) qrUrl += '?' + queryParams.join('&');
            
            document.getElementById('res-bank').innerText = bankName;
            document.getElementById('res-name').innerText = accName;
            document.getElementById('res-account').innerText = acc;
            if(amt) {
                document.getElementById('res-amount').innerText = new Intl.NumberFormat('vi-VN').format(amt) + ' đ';
                document.getElementById('res-amount-raw').innerText = amt;
            } else {
                document.getElementById('res-amount').innerText = "Tự nhập";
                document.getElementById('res-amount-raw').innerText = "";
            }
            document.getElementById('res-info').innerText = info ? info : "Trống";
            document.getElementById('qr-img').src = qrUrl;
            document.getElementById('qr-placeholder').classList.add('d-none');
            document.getElementById('qr-img').classList.remove('d-none');
            document.getElementById('transfer-info').
